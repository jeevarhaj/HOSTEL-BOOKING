<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Booking</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">🏠</div>
      <h1>Hostel Booking</h1>
      <p>Room Management System</p>
    </div>

    <div class="role-toggle">
      <button id="toggle-student" class="toggle-btn active" onclick="setRole('student')">Student</button>
      <button id="toggle-admin" class="toggle-btn" onclick="setRole('admin')">Admin</button>
    </div>

    <div id="login-error" class="error-msg hidden"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn-primary full-width" onclick="login()">Sign In</button>

    <p class="login-hint">
      Students: use your ID as password<br>
      Format: <strong>RA2511003010683</strong> (RA + 13 digits)<br>
      Admin: <strong>admin / admin1234</strong>
    </p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon-sm">🏠</div>
      <span>Hostel Booking</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" onclick="return navigate('dashboard', this)">⊞ Dashboard</a>
      <a href="#" class="nav-item" onclick="return navigate('all-rooms', this)">🛏 All Rooms</a>
      <a href="#" class="nav-item" onclick="return navigate('reports', this)">📊 Reports</a>
      <a href="#" class="nav-item" onclick="return navigate('my-room', this)">🔑 My Room</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <div>
        <span id="role-badge">Student</span>
        <span id="user-chip">User</span>
        <button id="topbar-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="content-area">

      <section id="page-dashboard" class="page active">
        <div id="stats-grid"></div>
        <h3>Room Overview</h3>
        <div id="dash-rooms-grid"></div>
      </section>

      <section id="page-all-rooms" class="page">
        <div id="all-rooms-grid"></div>
      </section>

      <section id="page-reports" class="page">
        <div id="reports-wrap"></div>
      </section>

      <section id="page-my-room" class="page">
        <div id="my-room-content"></div>
      </section>

    </div>
  </main>
</div>

<!-- BOTTOM NAV (mobile only) -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bottom-nav-btn active" onclick="mobileNav('dashboard', this)">
    <span class="bnav-icon">⊞</span>Dashboard
  </button>
  <button class="bottom-nav-btn" onclick="mobileNav('all-rooms', this)">
    <span class="bnav-icon">🛏</span>Rooms
  </button>
  <button class="bottom-nav-btn" onclick="mobileNav('reports', this)">
    <span class="bnav-icon">📊</span>Reports
  </button>
  <button class="bottom-nav-btn" onclick="mobileNav('my-room', this)">
    <span class="bnav-icon">🔑</span>My Room
  </button>
</nav>

<!-- BOOK MODAL -->
<div id="book-modal" class="modal-overlay hidden">
  <div class="modal">
    <h3>Book Room <span id="modal-room-id"></span></h3>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="book-name">
    </div>

    <div id="book-error" class="error-msg hidden"></div>

    <div class="modal-actions">
      <button class="btn-primary" onclick="confirmBook()">Confirm</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
